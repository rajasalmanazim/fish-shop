version: "3.9"

services:
  mongo-p2:
    image: mongo:6
    container_name: aquarium_mongo_p2
    volumes:
      - mongo_data_p2:/data/db
    ports:
      - "27018:27017"
    restart: unless-stopped

  backend-p2:
    image: node:18-alpine
    container_name: aquarium_backend_p2
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "npm install --production && node server.js"
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongo-p2:27017/fishShopDB
      - PORT=5000
    depends_on:
      - mongo-p2
    restart: unless-stopped

  frontend-p2:
    image: node:18-alpine
    container_name: aquarium_frontend_p2
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && REACT_APP_API_URL=http://13.239.186.68:5001 npm start"
    ports:
      - "3000:3000"
    depends_on:
      - backend-p2
    restart: unless-stopped

volumes:
  mongo_data_p2: